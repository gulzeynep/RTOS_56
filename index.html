<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAS RTOS Simulation - Case Study 5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <aside class="sidebar">
            <h2>Configuration</h2>
            <div class="control-group">
                <label>Radar Probability (%):</label>
                <input type="number" id="obstacleProb" value="30" min="0" max="100">
            </div>
            <div class="control-group">
                <label>Task_Compute Exec (ms):</label>
                <input type="number" id="computeTime" value="40" step="20">
            </div>
            <div class="control-group">
                <label>Task_Log Exec (ms):</label>
                <input type="number" id="logTime" value="160" step="20">
            </div>
            
            <button class="btn-reroll" onclick="runBatchSimulation()">Re-Roll Scheduling</button>

            <div class="status-card">
                <h3>QUEUE_RADAR</h3>
                <div class="stat-row">
                    <span>Messages:</span>
                    <span id="qVal">0 / 10</span>
                </div>
                <div class="stat-row">
                    <span>Dropped:</span>
                    <span id="dropVal">0</span>
                </div>
            </div>

            <div class="status-card">
                <h3>MUTEX_BRAKE</h3>
                <div class="stat-row">
                    <span>State:</span>
                    <span id="mState">Unlocked 🔓</span>
                </div>
                <div class="stat-row">
                    <span>Owner:</span>
                    <span id="mOwner">None</span>
                </div>
                <div class="stat-row">
                    <span>Locks:</span>
                    <span id="mCount">0</span>
                </div>
            </div>
        </aside>

        <main class="content">
            <header>
                <h1>ADAS RTOS Simulation - Case Study 5</h1>
                <p>System Window: <strong>500ms</strong> | Step: <strong>20ms</strong></p>
            </header>

            <section class="visualizer-section">
                <h3>Gantt Chart (500ms / 20ms Ticks)</h3>
                <div class="canvas-container">
                    <canvas id="ganttChart" width="850" height="300"></canvas>
                </div>
            </section>
            
            <section class="log-section">
                <h3>System Event Log</h3>
                <div id="eventLog" class="event-log-box"></div>
            </section>
        </main>
    </div>

    <script src="simulator.js"></script>
</body>
</html>
